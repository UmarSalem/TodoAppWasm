name: Deploy Blazor to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'BlazorApp/**'
      - 'HttpClients/**'
      - 'Shared/**'
      - '.github/workflows/blazor-github-pages.yml'
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'Optional Render API URL for this manual deployment, for example https://your-api.onrender.com/'
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Configure GitHub Pages base path
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_BASE_URL_INPUT: ${{ inputs.api_base_url }}
        run: |
          if [ -n "$API_BASE_URL_INPUT" ]; then
            API_BASE_URL="$API_BASE_URL_INPUT"
          fi

          if [ -z "$API_BASE_URL" ]; then
            echo "API_BASE_URL secret is required. Set it to your Render API URL, for example https://your-api.onrender.com/"
            exit 1
          fi

          if [[ "$API_BASE_URL" != http://* && "$API_BASE_URL" != https://* ]]; then
            echo "API_BASE_URL must be an absolute URL, for example https://your-api.onrender.com/"
            exit 1
          fi

          if [[ "$API_BASE_URL" != */ ]]; then
            API_BASE_URL="$API_BASE_URL/"
          fi

          sed -i "s|<base href=\"/\" />|<base href=\"/$REPO_NAME/\" />|" BlazorApp/wwwroot/index.html
          cat > BlazorApp/wwwroot/appsettings.Production.json <<JSON
          {
            "ApiBase": "$API_BASE_URL"
          }
          JSON

      - name: Publish Blazor WASM
        run: dotnet publish BlazorApp/BlazorApp.csproj -c Release -o release

      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
